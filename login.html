<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f2f2f2;
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            font-family:Arial;
            background-image:url('campus1.webp');
        }

        .login-box{
            background:white;
            padding:30px;
            width:350px;

            border-radius:10px;

            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#003366;
        }

        .form-control{
            margin-bottom:20px;
            height:45px;
        }

        .btn-login{
            background:#f39200;
            color:white;
            width:100%;
            height:45px;
            border:none;
        }

        .btn-login:hover{
            background:#cc7700;
        }

        .links{
            text-align:center;
            margin-top:15px;
        }

        .links a{
            text-decoration:none;
            color:#003366;
        }

    </style>
</head>

<body>

    <div class="login-box">

        <h1>Login</h1>

        <form>

            <input type="text"
            class="form-control"
            placeholder="Username"
            required>

            <input type="password"
            class="form-control"
            placeholder="Password"
            required>

            <button type="submit"
            class="btn btn-login">
                Login
            </button>

        </form>

        <div class="links">
            <p>
                Don't have an account?
                <a href="register.html">Register</a>
            </p>
        </div>

    </div>

</body>
</html>
