<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=1470&auto=format&fit=crop')
            no-repeat center center/cover;

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial;
             background-image:url('campus1.webp');
        }

        .register-box{
            background:white;

            width:400px;

            padding:30px;

            border-radius:12px;

            box-shadow:0 0 15px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            color:#003366;
            margin-bottom:25px;
        }

        .form-control{
            margin-bottom:20px;
            height:45px;
        }

        .btn-register{
            background:#f39200;
            color:white;

            width:100%;
            height:45px;

            border:none;
        }

        .btn-register:hover{
            background:#cc7700;
        }

        .links{
            text-align:center;
            margin-top:15px;
        }

        .links a{
            text-decoration:none;
            color:#003366;
        }

    </style>
</head>

<body>

    <div class="register-box">

        <h1>Register</h1>

        <form>

            <input type="text"
            class="form-control"
            placeholder="Enter Name"
            required>

            <input type="password"
            class="form-control"
            placeholder="Enter Password"
            required>

            <input type="password"
            class="form-control"
            placeholder="Retype Password"
            required>

            <input type="email"
            class="form-control"
            placeholder="Enter Email"
            required>

            <button class="btn btn-register">
                Register
            </button>

        </form>

        <div class="links">

            <p>
                Already have an account?
                <a href="login.html">Login</a>
            </p>

        </div>

    </div>

</body>
</html>
